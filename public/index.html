<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Asset Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: #1a202c;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .asset-item {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85em;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Log New Infrastructure Asset</h2>
        <form id="assetForm">
            <div class="form-group">
                <label for="assetName">Asset Name</label>
                <input type="text" id="assetName" placeholder="e.g., Staging VPC, Redis Cluster" required>
            </div>
            <div class="form-group">
                <label for="assetStatus">Status</label>
                <select id="assetStatus">
                    <option value="Active">Active</option>
                    <option value="Provisioning">Provisioning</option>
                    <option value="Degraded">Degraded</option>
                </select>
            </div>
            <button type="submit">Add Asset</button>
        </form>
    </div>

    <div class="card">
        <h2>Tracked Assets</h2>
        <div id="assetsList">Loading assets...</div>
    </div>

    <script>
        const assetForm = document.getElementById('assetForm');
        const assetsList = document.getElementById('assetsList');

        // Fetch and display assets from the database
        async function fetchAssets() {
            try {
                const response = await fetch('/api/assets');
                const assets = await response.json();

                if (assets.length === 0) {
                    assetsList.innerHTML = '<p style="color: #64748b;">No assets logged yet.</p>';
                    return;
                }

                assetsList.innerHTML = assets.map(asset => `
                    <div class="asset-item">
                        <span><strong>${escapeHtml(asset.name)}</strong></span>
                        <span class="status-badge">${escapeHtml(asset.status)}</span>
                    </div>
                `).join('');
            } catch (error) {
                assetsList.innerHTML = '<p style="color: #dc2626;">Error loading assets from backend.</p>';
            }
        }

        // Handle form submission
        assetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('assetName');
            const statusInput = document.getElementById('assetStatus');

            const payload = {
                name: nameInput.value,
                status: statusInput.value
            };

            try {
                const response = await fetch('/api/assets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    nameInput.value = ''; // Clear form
                    fetchAssets(); // Refresh list
                }
            } catch (error) {
                alert('Failed to submit asset.');
            }
        });

        // Helper to prevent script injection bugs
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        // Run on initial page load
        fetchAssets();
    </script>
</body>

</html>
